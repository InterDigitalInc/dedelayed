# @package _global_

tracker:
  experiment: ${hp.model.name}_ft_bdd100k

checkpoint:
  name: "${run.run_id}.${hp.model.name}.r${hp.config.remote_size}_l${hp.config.local_size}_ft_bdd100k_e${hp.config.epochs}.pth"

run:
  criterion:
    key: metrics.run.val_miou
    mode: max

hp:
  config:
    epochs: 10
    batch_size: 1
    aspect: 1.7778
    remote_size: 720
    local_size: 480
    seg_logits_interpolation: BILINEAR
    min_delay: 0
    max_delay: 5
    ips: 32
    ops: 8
    drop_path: 0.1
    drop_downlink_features_prob: 0.1667
    random_speedup_factors: [1]
    random_shift_idx_range: "${hp.dataset.train.kwargs.rel_idx_range}"

  optim:
    max_lr: 1e-4
    lr_pow: 2

  dataset:
    train:
      name: hf_temporal_columns
      kwargs:
        path: /path/to/labeled_video_dataset
        split: train
        rel_idx_anchor: null
        rel_idx_zero: 0
        rel_idx_range: [0, 14]
        remap:
          remote_frame: near_lossless
          local_frame: near_lossless
          seg_mask: label
    validation:
      name: hf_temporal_columns
      kwargs:
        path: /path/to/labeled_video_dataset
        split: validation
        rel_idx_anchor: target
        rel_idx_zero: 14
        rel_idx_range: [-14, 0]
        remap:
          remote_frame: original
          local_frame: original
          seg_mask: label_hq

  model:
    name: dedelayed_v1_efficientvitl1_efficientvitb0
    kwargs:
      num_classes: 19
      remote_model:
        temporal_depth: 4
        temporal_width: 96
        temporal_expand_ratio: 1
        temporal_norm_groups: 32
      local_model: {}

metrics:
  run:
    val_miou: null
    val_miou_at_past_ticks: null
